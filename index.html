<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agile Task Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <h1>Agile Task Manager</h1>
      <button id="darkModeBtn">🌓 Bật/Tắt Giao Diện</button>
    </nav>

    <div class="toolbar">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Tìm kiếm công việc..."
        />
      </div>
      <div class="add-task-box">
        <input
          type="text"
          id="taskNameInput"
          placeholder="Tên công việc mới..."
        />
        <input
          type="text"
          id="assigneeInput"
          placeholder="Người làm (ví dụ: Vũ)"
        />
        <button id="addBtn">+ Thêm</button>
      </div>
    </div>

    <div class="board">
      <div class="column" id="todo-col">
        <h2>📋 To Do</h2>
        <div class="task-list" id="todo-list">
          <div class="task-card" draggable="true" id="task-1">
            <span
              class="delete-btn"
              style="
                float: right;
                cursor: pointer;
                color: red;
                font-weight: bold;
              "
              >✖</span
            >
            <p>Học thuộc tính Draggable</p>
            <small>Người làm: Vũ</small>
          </div>
        </div>
      </div>
      <div class="column" id="doing-col">
        <h2>⚡Doing</h2>
        <div class="task-list" id="doing-list"></div>
      </div>
      <div class="column" id="done-col">
        <h2>✅ Done</h2>
        <div class="task-list" id="done-list"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
